# Blueprint opcional: Render → Blueprint → conecte o repo.
# Com rootDir: server → build/start usam server/package.json.
# Se o serviço foi criado na mão com raiz do repo, deixe "Root Directory" vazio:
# o package.json da raiz tem postinstall (instala server/) e start (sobe a API).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: task-manager-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
